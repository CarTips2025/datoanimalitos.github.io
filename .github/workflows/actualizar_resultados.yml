name: 🤖 Actualización Automática de Resultados

on:
  schedule:
    - cron: '0 3 * * *'  # 11:00 PM hora Venezuela (03:00 UTC)
  workflow_dispatch:  # Esto permite que lo pruebes manualmente ahora mismo

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🔧 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependencias
        run: |
          mkdir -p scripts
          echo '{"dependencies":{"node-fetch":"^3.3.2"}}' > scripts/package.json
          cd scripts && npm install

      - name: 🔍 Ejecutar Script de Actualización
        run: node scripts/obtener_de_api.js
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: 📤 Guardar cambios (Commit y Push)
        run: |
          git config --global user.name "Dr. Animalitos Bot"
          git config --global user.email "bot@datoanimalitos.github.io"
          git add data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Actualización automática $(date +'%d/%m/%Y')" && git push)
